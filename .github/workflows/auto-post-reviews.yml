name: Auto Post Reviews Daily

on:
  # 毎日AM4:00（JST）に自動実行
  schedule:
    - cron: '0 19 * * *' # UTC 19:00 = JST 4:00

  # 手動実行も可能
  workflow_dispatch:

concurrency:
  group: auto-post-reviews
  cancel-in-progress: false # 進行中のジョブはキャンセルしない（口コミ投稿の途中中断を防ぐ）

jobs:
  post-reviews:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run daily reviews (keiba-review-all)
        id: post-reviews
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        working-directory: packages/keiba-review-all
        run: |
          node scripts/production/run-daily-reviews-v4.cjs 2>&1 | tee /tmp/review-output.log
          echo "LOG_FILE=/tmp/review-output.log" >> $GITHUB_ENV

      - name: Verify execution (keiba-review-all)
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
        working-directory: packages/keiba-review-all
        run: node scripts/production/verify-daily-execution.cjs

      - name: Generate Summary Report
        if: always()
        run: |
          echo "## 📊 口コミ自動投稿レポート" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 実行日時 | $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST') |" >> $GITHUB_STEP_SUMMARY
          echo "| 🎯 投稿先 | keiba-review-all（全カテゴリ） |" >> $GITHUB_STEP_SUMMARY

          # ログから成功/失敗件数を抽出
          if [ -f /tmp/review-output.log ]; then
            SUCCESS_COUNT=$(grep "成功:" /tmp/review-output.log | tail -1 | sed 's/.*成功: \([0-9]*\)件.*/\1/' || echo "0")
            FAILED_COUNT=$(grep "失敗:" /tmp/review-output.log | tail -1 | sed 's/.*失敗: \([0-9]*\)件.*/\1/' || echo "0")
            TOTAL_COUNT=$((SUCCESS_COUNT + FAILED_COUNT))

            echo "| ✅ 成功 | ${SUCCESS_COUNT}件 |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ 失敗 | ${FAILED_COUNT}件 |" >> $GITHUB_STEP_SUMMARY
            echo "| 📝 合計 | ${TOTAL_COUNT}件 |" >> $GITHUB_STEP_SUMMARY

            # 成功率を計算
            if [ "$TOTAL_COUNT" -gt 0 ]; then
              SUCCESS_RATE=$((SUCCESS_COUNT * 100 / TOTAL_COUNT))
              echo "| 📈 成功率 | ${SUCCESS_RATE}% |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| ⚠️ ステータス | ログファイルが見つかりません |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # ステータスに応じたメッセージ
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ **実行結果: 成功**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **実行結果: 失敗** - ログを確認してください" >> $GITHUB_STEP_SUMMARY
          fi

      # ===== 🚀 Netlifyデプロイ (2026-01-21追加) =====
      # 口コミ投稿後、サイトをリビルド&デプロイして反映する
      - name: Build site (keiba-review-all)
        if: success()
        working-directory: packages/keiba-review-all
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SITE_URL: https://keiba-review.jp
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
        run: pnpm build

      - name: Deploy to Netlify (keiba-review-all)
        if: success()
        working-directory: packages/keiba-review-all
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN_KEIBA_REVIEW_ALL }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_KEIBA_REVIEW_ALL }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --message="Auto-deploy after reviews posting"

      # ===== 🚀 nankan-reviewのビルド＆デプロイ =====
      - name: Build site (nankan-review)
        if: success()
        working-directory: packages/nankan-review
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SITE_URL: https://nankan.keiba-review.jp
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID_NANKAN }}
        run: pnpm build

      - name: Deploy to Netlify (nankan-review)
        if: success()
        working-directory: packages/nankan-review
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN_NANKAN_REVIEW }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_NANKAN_REVIEW }}
        run: |
          npm install -g netlify-cli
          netlify deploy --prod --message="Auto-deploy after reviews posting"

      - name: Deployment summary
        if: success()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚀 デプロイ完了" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **keiba-review.jp** に最新の口コミが反映されました" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 サイトURL: https://keiba-review.jp" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **nankan.keiba-review.jp** に最新の口コミが反映されました" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 サイトURL: https://nankan.keiba-review.jp" >> $GITHUB_STEP_SUMMARY

      # ===== 🚨 エラー通知 (failure / cancelled / timeout) =====
      # if: always() で常に実行し、success 以外の場合のみ通知を送信する。
      # cancelled() は timeout による強制終了も含む。
      - name: Notify on failure or cancellation
        if: always() && job.status != 'success'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          STATUS="${{ job.status }}"
          REPO="${{ github.repository }}"
          BRANCH="${{ github.ref_name }}"
          COMMIT="${{ github.sha }}"
          COMMIT_SHORT="${COMMIT:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          DATETIME="$(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S JST')"
          WORKFLOW="${{ github.workflow }}"
          TRIGGER="${{ github.event_name }}"

          # timeout の場合は cancelled として報告される。メッセージで区別する。
          if [ "$STATUS" = "cancelled" ]; then
            REASON="cancelled (timeout-minutes: 45 超過の可能性)"
          else
            REASON="$STATUS"
          fi

          # ===== コンソールログ出力（常に実行）=====
          echo "::error::🚨 Workflow failed: ${WORKFLOW}"
          echo "  Status: ${STATUS}"
          echo "  Reason: ${REASON}"
          echo "  Branch: ${BRANCH}"
          echo "  Commit: ${COMMIT_SHORT}"
          echo "  Run: ${RUN_URL}"

          # ===== GitHub Step Summary =====
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## 🚨 エラー通知" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 項目 | 内容 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ステータス | \`${STATUS}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 理由 | ${REASON} |" >> $GITHUB_STEP_SUMMARY
          echo "| 日時 | ${DATETIME} |" >> $GITHUB_STEP_SUMMARY
          echo "| ブランチ | ${BRANCH} |" >> $GITHUB_STEP_SUMMARY
          echo "| コミット | \`${COMMIT_SHORT}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| トリガー | ${TRIGGER} |" >> $GITHUB_STEP_SUMMARY
          echo "| ログ | [GitHub Actions](${RUN_URL}) |" >> $GITHUB_STEP_SUMMARY

          # ===== Discord Webhook =====
          if [ -n "$DISCORD_WEBHOOK_URL" ]; then
            DISCORD_PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "content": null,
            "embeds": [{
              "title": "🚨 [ERROR] ${WORKFLOW}",
              "color": 15158332,
              "fields": [
                {"name": "Status", "value": "\`${STATUS}\`", "inline": true},
                {"name": "Reason", "value": "${REASON}", "inline": true},
                {"name": "Branch", "value": "\`${BRANCH}\`", "inline": true},
                {"name": "Commit", "value": "\`${COMMIT_SHORT}\`", "inline": true},
                {"name": "Trigger", "value": "${TRIGGER}", "inline": true},
                {"name": "Time", "value": "${DATETIME}", "inline": true},
                {"name": "Run URL", "value": "[View Logs](${RUN_URL})"}
              ],
              "footer": {"text": "${REPO}"}
            }]
          }
          EOFPAYLOAD
          )
            HTTP_CODE=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d "$DISCORD_PAYLOAD" \
              "$DISCORD_WEBHOOK_URL")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Discord通知送信成功 (HTTP ${HTTP_CODE})"
            else
              echo "⚠️ Discord通知送信失敗 (HTTP ${HTTP_CODE})"
              cat /tmp/discord_response.txt 2>/dev/null || true
            fi
          else
            echo "⚠️ DISCORD_WEBHOOK_URL が未設定のため、Discord通知をスキップ"
          fi

          # ===== Slack Webhook =====
          if [ -n "$SLACK_WEBHOOK_URL" ]; then
            SLACK_PAYLOAD=$(cat <<EOFPAYLOAD
          {
            "text": "🚨 *[ERROR] ${WORKFLOW}*",
            "blocks": [
              {
                "type": "header",
                "text": {"type": "plain_text", "text": "🚨 ${WORKFLOW} failed"}
              },
              {
                "type": "section",
                "fields": [
                  {"type": "mrkdwn", "text": "*Status:*\n\`${STATUS}\`"},
                  {"type": "mrkdwn", "text": "*Reason:*\n${REASON}"},
                  {"type": "mrkdwn", "text": "*Branch:*\n\`${BRANCH}\`"},
                  {"type": "mrkdwn", "text": "*Commit:*\n\`${COMMIT_SHORT}\`"},
                  {"type": "mrkdwn", "text": "*Trigger:*\n${TRIGGER}"},
                  {"type": "mrkdwn", "text": "*Time:*\n${DATETIME}"}
                ]
              },
              {
                "type": "actions",
                "elements": [
                  {
                    "type": "button",
                    "text": {"type": "plain_text", "text": "View Logs"},
                    "url": "${RUN_URL}"
                  }
                ]
              }
            ]
          }
          EOFPAYLOAD
          )
            HTTP_CODE=$(curl -s -o /tmp/slack_response.txt -w "%{http_code}" \
              -H "Content-Type: application/json" \
              -d "$SLACK_PAYLOAD" \
              "$SLACK_WEBHOOK_URL")
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✅ Slack通知送信成功 (HTTP ${HTTP_CODE})"
            else
              echo "⚠️ Slack通知送信失敗 (HTTP ${HTTP_CODE})"
              cat /tmp/slack_response.txt 2>/dev/null || true
            fi
          else
            echo "⚠️ SLACK_WEBHOOK_URL が未設定のため、Slack通知をスキップ"
          fi
