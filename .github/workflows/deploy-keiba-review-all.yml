name: Deploy keiba-review-all

on:
  push:
    branches: [main]
    paths:
      - 'packages/keiba-review-all/**'
      - 'packages/shared/**'
      - '.github/workflows/deploy-keiba-review-all.yml'
  workflow_dispatch:

concurrency:
  group: deploy-keiba-review-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build keiba-review-all
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          SITE_URL: https://keiba-review.jp
          PUBLIC_GA_ID: ${{ secrets.PUBLIC_GA_ID }}
        run: pnpm --filter=@keiba-review/keiba-review-all build

      - name: Install Netlify CLI
        run: npm install -g netlify-cli

      - name: Pre-deployment verification (デプロイ前ゲート)
        run: |
          cd packages/keiba-review-all
          echo "===== ステップ1: 場所の確認 ====="
          pwd
          echo ""
          echo "===== ステップ2: ディレクトリ内容確認 ====="
          ls -la
          echo ""
          echo "===== ステップ3: dist の存在確認 ====="
          ls -la dist
          echo ""
          echo "===== ステップ4: netlify.toml の確認 ====="
          cat netlify.toml | sed -n '1,80p'
          echo ""
          echo "✅ デプロイ前検証完了"

      - name: Deploy to Netlify
        working-directory: packages/keiba-review-all
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN_KEIBA_REVIEW_ALL }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID_KEIBA_REVIEW_ALL }}
        run: netlify deploy --prod --message="Deploy from GitHub Actions"

      - name: Report deployment status
        if: success()
        run: |
          echo "🚀 keiba-review-all のデプロイが完了しました"
          echo "📍 URL: https://keiba-review.jp"
